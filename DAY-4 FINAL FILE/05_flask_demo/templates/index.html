{% extends "base.html" %}

{% block content %}
<h1>Task Manager</h1>
<form action="{{ url_for('add_task') }}" method="POST">
    <input type="text" name="task_content" placeholder="Enter a new task" required>
    <button type="submit" class="btn btn-add">Add Task</button>
</form>
<ul>
    {% for task in tasks %}
    <li>
        {{ task }}
        <form action="{{ url_for('delete_task', task_id=loop.index0) }}" method="POST" style="display:inline;">
            <button type="submit" class="btn btn-delete">Delete</button>
        </form>
    </li>
    {% endfor %}
</ul>
{% endblock %}
